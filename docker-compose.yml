version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dpe-matching-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dpe_user
      POSTGRES_PASSWORD: dpe_password
      POSTGRES_DB: dpe_matching
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dpe_user -d dpe_matching']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dpe-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dpe-matching-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://dpe_user:dpe_password@postgres:5432/dpe_matching
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      LOG_LEVEL: info
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dpe-network
    command: >
      sh -c "
        cd packages/backend &&
        npx prisma migrate deploy &&
        cd ../.. &&
        node packages/backend/dist/index.js
      "

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dpe-matching-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - dpe-network

volumes:
  postgres_data:
    driver: local

networks:
  dpe-network:
    driver: bridge
