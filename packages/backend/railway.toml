[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && cd ../shared && pnpm build && cd ../backend && npx prisma generate && pnpm build"

[deploy]
startCommand = "npx prisma migrate deploy && node dist/index.js"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 3001
