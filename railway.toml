[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @dpe-matching/shared build && cd packages/backend && npx prisma generate && pnpm build"

[deploy]
startCommand = "cd packages/backend && npx prisma migrate deploy && node dist/index.js"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 3001
